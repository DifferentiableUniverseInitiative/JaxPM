# ReadTheDocs build configuration.
# https://docs.readthedocs.com/platform/en/stable/config-file/v2.html
#
# Renders the tutorial notebooks with Sphinx + nbsphinx. nbsphinx is configured to
# never execute notebooks, so the build does not import jaxpm and only needs the
# lightweight deps in docs/requirements.txt plus pandoc (installed via apt below).
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - pandoc

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/conf.py
